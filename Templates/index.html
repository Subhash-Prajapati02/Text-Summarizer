<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <div class="container">
      <h1>✨ Text Summarizer</h1>
      <h3>Powered by HuggingFace Transformers</h3>
      <p class="subtitle">
        Paste your content below and get a concise summary instantly
      </p>

      <form id="summarization-form">
        <textarea
          id="dialogue-input"
          placeholder="Paste or type your text here..."
          required
        ></textarea>

        <button type="submit">Summarize 🚀</button>
      </form>

      <div id="summary-output">
        <h3 id="summary-heading">📄 Summary</h3>
        <p id="summary-text">Your summary will appear here...</p>
      </div>
    </div>

    <script>
      document
        .getElementById("summarization-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const dialogueInput = document.getElementById("dialogue-input");
          const summaryText = document.getElementById("summary-text");
          const submitButton = e.target.querySelector("button");

          const dialogue = dialogueInput.value.trim();
          if (!dialogue) return;

          summaryText.innerText = "Processing...";
          submitButton.disabled = true;

          try {
            const response = await fetch("/summarize", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ dialogue }),
            });

            if (!response.ok) {
              throw new Error(`Server error: ${response.status}`);
            }

            const data = await response.json();
            summaryText.innerText = data.summary || "No summary returned.";
          } catch (err) {
            summaryText.innerText = `Error: ${err.message}`;
          } finally {
            submitButton.disabled = false;
          }
        });
    </script>
  </body>
</html>
